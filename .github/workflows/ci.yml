name: Python Calculator CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-test-lint:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.8]

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pylint

    - name: Run Pylint
      run: |
        pylint calculator.py calculator_logic.py --fail-under=8.0 || true

    - name: Run Pytest
      run: |
        pytest -v

    - name: Build Check
      run: |
        python -m py_compile calculator.py
        python -m py_compile calculator_logic.py

    - name: Success
      run: echo "Build Successful"
      